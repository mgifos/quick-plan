version = 3.10.0
runner.dialect = scala3

# Databricks style guide: 100 character line limit
maxColumn = 100

# Databricks style guide: 4-space indent for method/class parameter definitions when wrapping,
# 2-space indent for call sites and constructors
indent.defnSite = 4
indent.callSite = 2
indent.ctorSite = 2

# Databricks style guide: no vertical alignment
align.preset = none

# Databricks style guide: JavaDoc-style scaladoc
docstrings.style = Asterisk
docstrings.oneline = fold

# Databricks style guide: sorted imports, curly-brace for-comprehensions
rewrite.rules = [SortImports, PreferCurlyFors]

# Spaces inside import braces: import a.{B, C}
spaces.inImportCurlyBraces = true

includeCurlyBraceInSelectChains = false
optIn.breakChainOnFirstMethodDot = false
