rules = [
  DisableSyntax,
  LeakingImplicitClassVal,
  NoValInForComprehension,
  OrganizeImports,
  RedundantSyntax,
  RemoveUnused,
]

# --- DisableSyntax ---------------------------------------------------------
# Databricks: "Avoid var" — prefer val and immutable data structures
# Databricks: "Prefer Option over null" — null causes NullPointerExceptions
# Databricks: "Avoid return" — return breaks referential transparency in closures
# Databricks: "Avoid asInstanceOf / isInstanceOf" — use pattern matching instead
# Databricks: "Avoid while loops" — prefer recursion or higher-order functions
DisableSyntax.noVars = true
DisableSyntax.noNulls = true
DisableSyntax.noReturns = true
DisableSyntax.noAsInstanceOf = true
DisableSyntax.noIsInstanceOf = true
DisableSyntax.noWhileLoops = true
DisableSyntax.noThrows = false
DisableSyntax.noXml = true

# --- OrganizeImports -------------------------------------------------------
# Databricks import order: java/javax → scala → third-party → project
OrganizeImports {
  groups = [
    "re:javax?\\.",
    "scala.",
    "*",
    "com.github.mgifos."
  ]
  removeUnused = true
  targetDialect = Scala3
}

# --- RemoveUnused ----------------------------------------------------------
# Databricks: remove unused imports, locals, private members
RemoveUnused {
  imports = true
  privates = true
  locals = true
  patternvars = true
  params = false
}
